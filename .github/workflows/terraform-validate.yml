---
name: Terraform Validate

on:
  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tftest.hcl'
      - '.github/workflows/terraform-validate.yml'
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '**.tftest.hcl'
      - '.github/workflows/terraform-validate.yml'

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"

jobs:
  fmt:
    name: terraform fmt
    runs-on: ubuntu-latest
    outputs:
      result: ${{ steps.fmt.outcome }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - id: fmt
        run: terraform fmt -check -recursive -diff

  discover:
    name: discover terraform dirs
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.find.outputs.modules }}
      examples: ${{ steps.find.outputs.examples }}
    steps:
      - uses: actions/checkout@v4
      - id: find
        run: |
          set -euo pipefail
          modules=$(find modules -mindepth 1 -maxdepth 1 -type d | jq -R -s -c 'split("\n")[:-1]')
          examples=$(find examples -mindepth 1 -maxdepth 1 -type d | jq -R -s -c 'split("\n")[:-1]')
          echo "modules=${modules}" >> "$GITHUB_OUTPUT"
          echo "examples=${examples}" >> "$GITHUB_OUTPUT"

  validate-modules:
    name: validate ${{ matrix.dir }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - working-directory: ${{ matrix.dir }}
        run: terraform init -backend=false
      - working-directory: ${{ matrix.dir }}
        run: terraform validate -no-color

  validate-examples:
    name: validate ${{ matrix.dir }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.discover.outputs.examples) }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - working-directory: ${{ matrix.dir }}
        run: terraform init -backend=false
      - working-directory: ${{ matrix.dir }}
        run: terraform validate -no-color

  test-modules:
    name: terraform test ${{ matrix.dir }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.discover.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: skip if no tests
        id: check
        working-directory: ${{ matrix.dir }}
        run: |
          if compgen -G "tests/*.tftest.hcl" > /dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.has_tests == 'true'
        working-directory: ${{ matrix.dir }}
        run: terraform init -backend=false
      - if: steps.check.outputs.has_tests == 'true'
        working-directory: ${{ matrix.dir }}
        run: terraform test -no-color

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: tflint --recursive --minimum-failure-severity=warning

  tfsec:
    name: tfsec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          soft_fail: false
          additional_args: --minimum-severity HIGH

  comment:
    name: PR validation summary
    if: github.event_name == 'pull_request' && always()
    needs: [fmt, validate-modules, validate-examples, test-modules, tflint, tfsec]
    runs-on: ubuntu-latest
    steps:
      - name: Sticky PR comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: terraform-validate
          message: |
            ### Terraform validation — `${{ github.sha }}`

            | Check | Result |
            | --- | --- |
            | terraform fmt | ${{ needs.fmt.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.fmt.result }} |
            | module validate | ${{ needs.validate-modules.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.validate-modules.result }} |
            | example validate | ${{ needs.validate-examples.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.validate-examples.result }} |
            | terraform test | ${{ needs.test-modules.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.test-modules.result }} |
            | tflint | ${{ needs.tflint.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.tflint.result }} |
            | tfsec | ${{ needs.tfsec.result == 'success' && ':white_check_mark:' || ':x:' }} ${{ needs.tfsec.result }} |

            _Workflow run: ${{ github.run_id }}_
